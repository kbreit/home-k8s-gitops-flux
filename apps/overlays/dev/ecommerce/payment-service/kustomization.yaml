apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../base/ecommerce/product-service
  - ./networkpolicy.yaml
  - ./ciliumnetworkpolicy.yaml
patches:
  - patch: |-
      - op: replace
        path: /spec/ref/semver
        value: "0.4.0"
    target:
      kind: OCIRepository
      name: product-service
  - patch: |-
      - op: replace
        path: /spec/values
        value:
          ingress:
            host: payment.home.kevinbreit.net
          image:
            tag: "0.4.0"
          imagePullSecrets:
            - name: ghcr-token
          envFrom:
            - secretRef:
                name: product-service-secret
            - configMapRef:
                name: product-service-config
          database:
            host: ecommerce-dev-rw.cnpg-system
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
    target:
      kind: HelmRelease
      name: product-service

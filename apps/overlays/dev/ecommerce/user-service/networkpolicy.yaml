apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: user-service-to-database
  namespace: ecommerce
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: user-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
          podSelector:
            matchlabels:
              app.kubernetes.io/component: database
              app.kubernetes.io/instance: ecommerce
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

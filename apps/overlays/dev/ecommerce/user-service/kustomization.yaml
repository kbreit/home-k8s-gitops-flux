apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../base/ecommerce/user-service
  - ./user-service-secret.yaml
  - ./networkpolicy.yaml
patches:
  - patch: |-
      - op: replace
        path: /spec/ref/semver
        value: "1.6.0"
    target:
      kind: OCIRepository
      name: user-service
  - patch: |-
      - op: replace
        path: /spec/values
        value:
          ingress:
            host: user.home.kevinbreit.net
          image:
            tag: "1.4.1"
          imagePullSecrets:
            - name: ghcr-token
          envFrom:
            - secretRef:
                name: user-service-secret
          database:
            host: ecommerce-dev.cnpg-system
    target:
      kind: HelmRelease
      name: user-service

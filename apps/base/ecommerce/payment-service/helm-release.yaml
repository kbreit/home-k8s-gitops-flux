apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: payment-service
  namespace: ecommerce
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: payment-service
    namespace: flux-system
  values:
    ingress:
      host: payment.home.kevinbreit.net
    image:
      tag: "0.4.0"
    imagePullSecrets:
      - name: ghcr-token
    envFrom:
      - secretRef:
          name: payment-service-secret
